name: Bug Report
description: Report a bug in gitea-mcp
title: "[Bug]: "
labels: ["bug"]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of `@amonstack/gitea-mcp` are you using?
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: e.g. v20.11.0
    validations:
      required: true

  - type: input
    id: mcp-client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      placeholder: e.g. opencode, Claude Desktop, Cursor
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Steps to reproduce, expected vs actual behavior
      placeholder: |
        1. Run `npx @amonstack/gitea-mcp`
        2. Call tool `list_issues` with ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error messages, stack traces, or server output
      render: text
