name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: make verify
      - run: make package
      - name: Dry-run publish (high version to avoid conflicts)
        run: |
          node -e "const p=require('./package.json');p.version='999.999.999';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          npm publish --dry-run --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
